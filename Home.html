<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoomieMatch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1 class="logo">RoomieMatch</h1>
        <div class="match-badge">
          <span class="percentage">92%</span> Match
        </div>
      </div>
      
      <div class="greeting">
        Hi Alex! <span class="wave">🎉</span>
      </div>
      
      <div class="profile">
        <div class="avatar">
          <span class="initials">SM</span>
        </div>
        <div class="info">
          <h2 class="name">Sarah Miller, <span class="age">26</span></h2>
          <p class="job">Graphic Designer</p>
        </div>
      </div>
      
      <div class="details">
        <div class="location">
          <span class="icon">📍</span> Yaounde
        </div>
        <div class="price">
          <span class="icon">💰</span> 80 000frs
        </div>
      </div>
      
      <div class="preferences">
        <h3>⭐ TOP SHARED PREFERENCES</h3>
        <div class="chips">
          <span class="chip">Clean Space</span>
          <span class="chip">Quiet Hours</span>
          <span class="chip">Pet Friendly</span>
          <span class="chip">No Smoking</span>
        </div>
      </div>
      
      <div class="buttons">
        <button class="reject">Reject</button>
        <button class="accept">Accept</button>
      </div>
    </div>
</main>
<script src="script.js"></script>

</body>
</html>
