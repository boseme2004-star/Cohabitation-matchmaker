<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account - Cohabitation Matchmaking</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
    body { background:#f4f7fb; }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 25px;
      padding: 0 20px;
    }

    .sidebar {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }

    .sidebar h2 {
      margin-bottom: 20px;
      color: #4facfe;
    }

    .sidebar ul { list-style: none; }

    .sidebar ul li {
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: 0.3s;
    }

    .sidebar ul li:hover { background: #f0f5ff; }

    .main {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .main h1 {
      margin-bottom: 20px;
      color: #2c3e50;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .profile img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      outline: none;
    }

    .btn {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      background: #4facfe;
      color: white;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn:hover { background: #3a8be0; }

    @media(max-width: 768px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h2>My Account</h2>
    <ul>
      <li>Profile</li>
      <li>Preferences</li>
      <li>Messages</li>
      <li>Settings</li>
      <li>Logout</li>
    </ul>
  </div>

  <div class="main">
    <h1>Profile Information</h1>

    <div class="profile">
      <img src="https://via.placeholder.com/100" alt="Profile Picture">
      <div>
        <h3>Your Name</h3>
        <p>Update your personal information</p>
      </div>
    </div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" placeholder="Enter your name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="Enter your email">
    </div>

    <div class="form-group">
      <label>Age</label>
      <input type="number" placeholder="Enter your age">
    </div>

    <div class="form-group">
      <label>Gender</label>
      <select>
        <option>Select</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
    </div>

    <div class="form-group">
      <label>Preferred Location</label>
      <input type="text" placeholder="City or area">
    </div>

    <button class="btn">Save Changes</button>
  </div>

</div>

</body>
</html>
