<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preferences - Cohabify</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
    body { background:#f4f7fb; }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 25px;
      padding: 0 20px;
    }

    .sidebar {
      background: white;
      padding: 25px;
      border-radius: 15px;
    }

    .main {
      background: white;
      padding: 30px;
      border-radius: 15px;
    }

    .form-group { margin-bottom: 15px; }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .btn {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      background: #4facfe;
      color: white;
      border-radius: 25px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>My Preferences</h2>
    <ul>
      
      <a href="Chat.html">
    <li onclick="goToChat()">Chat</li>
      </a>
      <a href="index.html">
      <li onclick="logout()">Logout</li>
      </a>
    </ul>
  </div>

  <div class="main">
    <h1>Preferences Information</h1>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name">
    </div>

    <div class="form-group">
      <label>Age</label>
      <input type="number" id="age">
    </div>

    <div class="form-group">
      <label>Gender</label>
      <select id="gender">
        <option value="">Select</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
    </div>

    <div class="form-group">
      <label>Location</label>
      <input type="text" id="location">
    </div>

    <div class="form-group">
      <label>Budget</label>
      <input type="text" id="budget">
    </div>

    <div class="form-group">
      <label>Occupation</label>
      <select id="occupation">
        <option value="">Select</option>
        <option>Student</option>
        <option>Employed</option>
      </select>
    </div>

    <div class="form-group">
      <label>Guests</label>
      <select id="guests">
        <option value="">Select</option>
        <option>Rarely</option>
        <option>Often</option>
        <option>Frequently</option>
      </select>
    </div>

    <div class="form-group">
      <label>Hygiene Level</label>
      <select id="hygiene">
        <option value="">Select</option>
        <option>Low</option>
        <option>Average</option>
        <option>High</option>
      </select>
    </div>

    <div class="form-group">
      <label>Lease Duration</label>
      <input type="text" id="lease">
    </div>

    <div class="form-group">
      <label>Bio</label>
      <input type="text" id="bio">
    </div>

    <button class="btn" onclick="savePreferences()">Save Changes</button>

  </div>

</div>

<script>
function savePreferences() {
  let currentUser = JSON.parse(localStorage.getItem("currentUser"));
  let users = JSON.parse(localStorage.getItem("users")) || [];

  if (!currentUser) {
    alert("Please login first");
    window.location.href = "login.html";
    return;
  }

  // Get values
  currentUser.name = document.getElementById("name").value;
  currentUser.age = document.getElementById("age").value;
  currentUser.gender = document.getElementById("gender").value;
  currentUser.location = document.getElementById("location").value;
  currentUser.budget = document.getElementById("budget").value;
  currentUser.occupation = document.getElementById("occupation").value;
  currentUser.guests = document.getElementById("guests").value;
  currentUser.hygiene = document.getElementById("hygiene").value;
  currentUser.lease = document.getElementById("lease").value;
  currentUser.bio = document.getElementById("bio").value;

  // Update users array
  users = users.map(user =>
    user.email === currentUser.email ? currentUser : user
  );

  // Save back
  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("currentUser", JSON.stringify(currentUser));

  alert("Preferences saved successfully!");

  // Go to matches page
  window.location.href = "matches.html";
}

function logout() {
  localStorage.removeItem("currentUser");
  window.location.href = "login.html";
}

function goToChat() {
  window.location.href = "chat.html";
}
</script>

</body>
</html>
