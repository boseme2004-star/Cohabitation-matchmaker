<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Cohabitation Matchmaking</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

    body {
      background: linear-gradient(120deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .signup-container {
      background: white;
      width: 100%;
      max-width: 950px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .left {
      background: linear-gradient(120deg, #4facfe, #00f2fe);
      color: white;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .right { padding: 40px; }

    .right h2 { margin-bottom: 20px; color: #2c3e50; }

    .form-group { margin-bottom: 15px; }

    .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }

    .form-group input, .form-group select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      outline: none;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      background: #4facfe;
      color: white;
      border-radius: 25px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    .login-link {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }

    @media(max-width: 768px) {
      .signup-container { grid-template-columns: 1fr; }
      .left { display: none; }
    }
  </style>
</head>

<body>

<div class="signup-container">

  <div class="left">
    <h1>Join Us Today</h1>
    <p>Find your perfect roommate and enjoy a compatible living experience.</p>
  </div>

  <div class="right">
    <h2>Create Account</h2>

    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" id="firstName">
      </div>

      <div class="form-group">
        <label>Last Name</label>
        <input type="text" id="lastName">
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password">
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Age</label>
        <input type="number" id="age">
      </div>

      <div class="form-group">
        <label>Gender</label>
        <select id="gender">
          <option value="">Select</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Preferred Location</label>
      <input type="text" id="location">
    </div>

    <button class="btn" onclick="createAccount()">Create Account</button>

    <div class="login-link">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

</div>

<script>
function createAccount() {
  const firstName = document.getElementById("firstName").value;
  const lastName = document.getElementById("lastName").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const age = document.getElementById("age").value;
  const gender = document.getElementById("gender").value;
  const location = document.getElementById("location").value;

  // Check empty fields
  if (!firstName || !lastName || !email || !password || !confirmPassword) {
    alert("Please fill all required fields");
    return;
  }

  // Password must be letters + numbers only
  const passwordPattern = /^[A-Za-z0-9]+$/;
  if (!passwordPattern.test(password)) {
    alert("Password must contain only letters and numbers");
    return;
  }

  // Check password match
  if (password !== confirmPassword) {
    alert("Passwords do not match");
    return;
  }

  // Create user object
  const user = {
    firstName,
    lastName,
    email,
    password,
    age,
    gender,
    location
  };

  // Save to localStorage
  localStorage.setItem("userProfile", JSON.stringify(user));

  alert("Account created successfully!");

  // Redirect
  window.location.href = "SetUpPreferences.html";
}
</script>

</body>
</html>
