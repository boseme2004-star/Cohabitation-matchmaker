<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Cohabitation Matchmaking</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

    body {
      background: linear-gradient(120deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .signup-container {
      background: white;
      width: 100%;
      max-width: 950px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .left {
      background: linear-gradient(120deg, #4facfe, #00f2fe);
      color: white;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .left h1 {
      font-size: 36px;
      margin-bottom: 15px;
    }

    .left p {
      opacity: 0.9;
      line-height: 1.6;
    }

    .right {
      padding: 40px;
    }

    .right h2 {
      margin-bottom: 20px;
      color: #2c3e50;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      outline: none;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      background: #4facfe;
      color: white;
      border-radius: 25px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    .btn:hover { background: #3a8be0; }

    .login-link {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }

    .login-link a {
      color: #4facfe;
      text-decoration: none;
      font-weight: 500;
    }

    @media(max-width: 768px) {
      .signup-container { grid-template-columns: 1fr; }
      .left { display: none; }
    }
  </style>
</head>
<body>

<div class="signup-container">

  <div class="left">
    <h1>Join Us Today</h1>
    <p>
      Find your perfect roommate and enjoy a compatible living experience.
      Our platform matches you based on lifestyle, habits, and preferences.
    </p>
  </div>

  <div class="right">
    <h2>Create Account</h2>

    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" placeholder="Enter first name">
      </div>

      <div class="form-group">
        <label>Last Name</label>
        <input type="text" placeholder="Enter last name">
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="Enter your email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="Create a password">
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" placeholder="Confirm password">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Age</label>
        <input type="number" placeholder="Age">
      </div>

      <div class="form-group">
        <label>Gender</label>
        <select>
          <option>Select</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Preferred Location</label>
      <input type="text" placeholder="City or area">
    </div>

    <button class="btn">Create Account</button>

    <div class="login-link">
      Already have an account? <a href="#">Login</a>
    </div>
  </div>

</div>

</body>
</html>
