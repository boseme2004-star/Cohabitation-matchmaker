<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cohabify | Login</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      width: 100%;
      max-width: 400px;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
      animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #2c3e50;
    }

    .form-group {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      outline: none;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #4facfe;
      box-shadow: 0 0 5px rgba(79,172,254,0.3);
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      background: #4facfe;
      color: white;
      border-radius: 25px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #3a8be0;
    }

    .toggle {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .toggle a {
      color: #4facfe;
      text-decoration: none;
      font-weight: 500;
    }

    .toggle a:hover {
      text-decoration: underline;
    }

    .message {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      color: green;
    }

    .error {
      color: red;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Login to Cohabify</h2>

  <div class="form-group">
    <input type="text" id="loginInput" placeholder="Email or Full Name">
  </div>

  <div class="form-group">
    <input type="password" id="loginPassword" placeholder="Password">
  </div>

  <button onclick="loginUser()">Login</button>

  <div class="toggle">
    Don’t have an account? <a href="CreateAccount.html">Sign Up</a>
  </div>

  <div id="message" class="message"></div>
</div>

<script>
const msg = document.getElementById("message");

function loginUser() {
  const input = document.getElementById("loginInput").value.trim().toLowerCase();
  const password = document.getElementById("loginPassword").value.trim();

  const passwordFormat = /^[a-zA-Z0-9]+$/;

  if (!input || !password) {
    showMessage("Please fill in all fields.", true);
    return;
  }

  if (!passwordFormat.test(password)) {
    showMessage("Password must contain only letters and numbers.", true);
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  const validUser = users.find(user => {
    const fullName = (user.firstName + " " + user.lastName).toLowerCase();
    return (
      user.email.toLowerCase() === input ||
      fullName === input
    ) && user.password === password;
  });

  if (validUser) {
    // Save logged in user
    localStorage.setItem("currentUser", JSON.stringify(validUser));

    showMessage("Login successful!");

    setTimeout(() => {
      window.location.href = "home.html";
    }, 1000);
  } else {
    showMessage("Invalid email/name or password.", true);
  }
}

function showMessage(text, error = false) {
  msg.textContent = text;
  msg.className = error ? "message error" : "message";
}
</script>

</body>
</html>
